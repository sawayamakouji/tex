<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><title>People Count Space</title><style>html,body{margin:0;height:100%;overflow:hidden;background:#05060a;color:white;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans JP',sans-serif}canvas{position:fixed;inset:0;width:100vw;height:100vh}video{display:none}.panel{position:fixed;inset:0;display:grid;place-items:center;padding:20px;background:radial-gradient(circle at 50% 20%,rgba(80,130,255,.25),transparent 36%),rgba(5,6,10,.82);backdrop-filter:blur(8px);z-index:10}.card{max-width:760px;border:1px solid rgba(255,255,255,.18);border-radius:24px;padding:24px;background:rgba(8,10,18,.82);box-shadow:0 20px 70px rgba(0,0,0,.5)}h1{margin:0 0 10px;font-size:clamp(28px,7vw,44px);letter-spacing:-.05em}p{color:rgba(255,255,255,.68);line-height:1.7;font-size:14px}.buttons{display:grid;grid-template-columns:1fr;gap:10px;margin-top:18px}@media(min-width:600px){.buttons{grid-template-columns:1fr 1fr 1fr}}button{border:1px solid rgba(255,255,255,.18);border-radius:18px;min-height:54px;padding:12px 14px;font-size:15px;font-weight:800;background:linear-gradient(135deg,#fff,#9ec7ff 55%,#c8a7ff);color:#07111f}.secondary{background:rgba(255,255,255,.09);color:white}.note{margin-top:14px;padding:12px;border-radius:16px;background:rgba(255,255,255,.07);color:rgba(255,255,255,.64);font-size:12px;line-height:1.6}.err{color:#ff91a2;white-space:pre-wrap;font-size:13px;line-height:1.6}.hud{position:fixed;top:calc(10px + env(safe-area-inset-top));left:10px;right:10px;z-index:5;display:flex;gap:8px;align-items:center;pointer-events:none}.status{flex:1;min-width:0;padding:9px 12px;border:1px solid rgba(255,255,255,.16);border-radius:999px;background:rgba(8,10,18,.58);backdrop-filter:blur(8px);color:rgba(255,255,255,.7);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.bar{width:90px;height:9px;border-radius:999px;background:rgba(255,255,255,.15);overflow:hidden}.fill{height:100%;width:0;background:linear-gradient(90deg,#70e0ff,#fff,#cba5ff)}.ctrl{position:fixed;left:10px;right:10px;bottom:calc(10px + env(safe-area-inset-bottom));z-index:6;display:grid;grid-template-columns:repeat(5,1fr);gap:7px}.ctrl button{min-height:46px;border-radius:15px;background:rgba(8,10,18,.62);color:white;font-size:11px;padding:6px}.hidden{display:none}</style></head><body><canvas id="cv"></canvas><video id="video" playsinline muted autoplay></video><div id="panel" class="panel"><div class="card"><h1>People Count Space</h1><p>カメラに映った顔の数をカウントし、人数と顔位置に応じて粒子空間を変化させます。これは「顔が見えている人数」のカウントです。後ろ姿や顔が隠れた人は漏れる場合があります。</p><div class="buttons"><button id="front">前面カメラで開始</button><button id="rear" class="secondary">背面カメラで開始</button><button id="demo" class="secondary">デモ表示</button></div><div class="note">スマホのカメラ利用はHTTPS配信が前提です。映像はブラウザ内で処理します。MediaPipeのライブラリとモデルはCDNから読み込みます。</div><div id="env" class="note"></div><div id="err" class="err"></div></div></div><div class="hud"><div id="status" class="status"><b>READY</b> faces:0</div><div class="bar"><div id="fill" class="fill"></div></div></div><div id="ctrl" class="ctrl"><button id="videoBtn">VIDEO ON</button><button id="mirrorBtn">MIRROR ON</button><button id="resetBtn">RESET</button><button id="fullBtn">FULL</button><button id="menuBtn">MENU</button></div><script type="module">import{FaceDetector,FilesetResolver}from'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.22-rc.20250304/vision_bundle.mjs';const MODEL='https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/latest/blaze_face_short_range.tflite';const WASM='https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.22-rc.20250304/wasm';const cv=document.getElementById('cv'),ctx=cv.getContext('2d',{alpha:false}),video=document.getElementById('video'),panel=document.getElementById('panel'),err=document.getElementById('err'),env=document.getElementById('env'),status=document.getElementById('status'),fill=document.getElementById('fill');let W=0,H=0,dpr=matchMedia('(pointer:coarse)').matches?1:Math.min(2,devicePixelRatio||1),detector=null,stream=null,started=false,mode='none',faces=[],smooth=[],raw=0,stable=0,acc=0,particles=[],showVideo=true,mirror=true,lastDetect=0,lastVideo=-1,demoT=0;function resize(){W=innerWidth;H=innerHeight;cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0);resetParticles()}function resetParticles(){let n=Math.floor(430*Math.max(.8,Math.min(1.7,W*H/(390*844))));particles=Array.from({length:n},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.7,vy:(Math.random()-.5)*.7,s:.8+Math.random()*2,h:190+Math.random()*120,l:Math.random()}))}function envText(){env.innerHTML=`secureContext: <b>${isSecureContext}</b><br>camera API: <b>${!!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia)}</b><br>protocol: <b>${location.protocol}</b>`}async function loadDetector(){if(detector)return detector;const vision=await FilesetResolver.forVisionTasks(WASM);try{detector=await FaceDetector.createFromOptions(vision,{baseOptions:{modelAssetPath:MODEL,delegate:'GPU'},runningMode:'VIDEO',minDetectionConfidence:.52})}catch(e){detector=await FaceDetector.createFromOptions(vision,{baseOptions:{modelAssetPath:MODEL,delegate:'CPU'},runningMode:'VIDEO',minDetectionConfidence:.52})}return detector}async function startCamera(facing){try{err.textContent='';if(!isSecureContext)throw new Error('HTTPSで開いてください。');if(!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia))throw new Error('このブラウザではカメラAPIを使えません。');mirror=facing==='user';await loadDetector();stop();stream=await navigator.mediaDevices.getUserMedia({audio:false,video:{facingMode:{ideal:facing},width:{ideal:640},height:{ideal:480}}});video.srcObject=stream;await video.play();mode='camera';started=true;panel.style.display='none'}catch(e){err.textContent='カメラを開始できませんでした。\n'+(e.message||e);envText()}}function stop(){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}video.srcObject=null}function demoStart(){stop();mode='demo';started=true;panel.style.display='none'}function detect(now){if(mode==='demo'){demoT=now*.001;raw=Math.max(0,Math.min(4,Math.floor(1.6+1.5*Math.sin(demoT*.6)+Math.sin(demoT*.22))));faces=Array.from({length:raw},(_,i)=>{let a=demoT*(.5+i*.1)+i*2.1,s=Math.min(W,H)*.16,cx=W*(.5+Math.cos(a)*(.16+i*.04)),cy=H*(.45+Math.sin(a*1.2)*(.13+i*.03));return{x:cx-s*.45,y:cy-s*.55,w:s*.9,h:s,cx,cy}});smooth=blendFaces(smooth,faces);return}if(!detector||video.readyState<2||now-lastDetect<140||video.currentTime===lastVideo)return;lastDetect=now;lastVideo=video.currentTime;let r=detector.detectForVideo(video,now),ds=r.detections||[];raw=ds.length;faces=ds.map(d=>{let b=d.boundingBox,vw=video.videoWidth||640,vh=video.videoHeight||480,sc=Math.max(W/vw,H/vh),dw=vw*sc,dh=vh*sc,ox=(W-dw)/2,oy=(H-dh)/2,x=ox+b.originX*sc,y=oy+b.originY*sc,w=b.width*sc,h=b.height*sc;if(mirror)x=W-(x+w);return{x,y,w,h,cx:x+w/2,cy:y+h/2}});smooth=blendFaces(smooth,faces)}function blendFaces(prev,next){if(!prev.length)return next;return next.map(n=>{let p=prev.reduce((best,x)=>Math.hypot(n.cx-x.cx,n.cy-x.cy)<Math.hypot(n.cx-(best?.cx??1e9),n.cy-(best?.cy??1e9))?x:best,null);return p?{x:lerp(p.x,n.x,.35),y:lerp(p.y,n.y,.35),w:lerp(p.w,n.w,.35),h:lerp(p.h,n.h,.35),cx:lerp(p.cx,n.cx,.35),cy:lerp(p.cy,n.cy,.35)}:n})}function update(dt){acc=lerp(acc,raw,.18);stable=Math.round(acc);let cf=Math.min(1,raw/5);for(const p of particles){let ax=(W/2-p.x)*(raw?.001:.004),ay=(H/2-p.y)*(raw?.001:.004);for(const f of smooth){let dx=f.cx-p.x,dy=f.cy-p.y,ds=dx*dx+dy*dy+80,d=Math.sqrt(ds),inf=Math.min(2.2,Math.max(f.w,f.h)*18/ds);if(d<Math.max(f.w,f.h)*.7){ax-=dx/d*inf*.42;ay-=dy/d*inf*.42}else{ax+=dx/d*inf*(.18+cf*.32);ay+=dy/d*inf*(.18+cf*.32)}}p.vx=(p.vx+ax)*(.965-cf*.02);p.vy=(p.vy+ay)*(.965-cf*.02);p.x+=p.vx*dt*60;p.y+=p.vy*dt*60;p.l+=dt;if(p.x<-40)p.x=W+40;if(p.x>W+40)p.x=-40;if(p.y<-40)p.y=H+40;if(p.y>H+40)p.y=-40}}function draw(){let cf=Math.min(1,raw/5),g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,`hsl(${225+cf*55},55%,7%)`);g.addColorStop(1,'#05060a');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);if(showVideo&&mode==='camera'&&video.readyState>=2){let vw=video.videoWidth||640,vh=video.videoHeight||480,sc=Math.max(W/vw,H/vh),dw=vw*sc,dh=vh*sc,x=(W-dw)/2,y=(H-dh)/2;ctx.save();ctx.globalAlpha=.16;ctx.filter='blur(2px) saturate(1.25)';if(mirror){ctx.translate(W,0);ctx.scale(-1,1)}ctx.drawImage(video,x,y,dw,dh);ctx.restore();ctx.fillStyle='rgba(5,6,10,.52)';ctx.fillRect(0,0,W,H)}ctx.save();ctx.globalCompositeOperation='lighter';for(const p of particles){let hue=(p.h+raw*24+p.l*24)%360;ctx.fillStyle=`hsla(${hue},80%,68%,${.18+cf*.34})`;ctx.beginPath();ctx.arc(p.x,p.y,p.s*(1+cf*1.8),0,Math.PI*2);ctx.fill()}ctx.strokeStyle='rgba(130,220,255,.75)';ctx.lineWidth=2;for(let i=0;i<smooth.length;i++){let f=smooth[i];ctx.strokeRect(f.x,f.y,f.w,f.h);ctx.fillStyle='rgba(255,255,255,.9)';ctx.font='700 13px system-ui';ctx.fillText('#'+(i+1),f.x,f.y-7);for(let j=i+1;j<smooth.length;j++){ctx.beginPath();ctx.moveTo(f.cx,f.cy);ctx.lineTo(smooth[j].cx,smooth[j].cy);ctx.stroke()}}ctx.restore();ctx.fillStyle='rgba(8,10,18,.55)';round(12,58,310,112,18);ctx.fillStyle='rgba(255,255,255,.55)';ctx.font='700 10px system-ui';ctx.fillText('FACE COUNT',28,82);ctx.fillStyle='white';ctx.font='800 56px system-ui';ctx.fillText(String(raw),28,138);ctx.font='12px system-ui';ctx.fillStyle='rgba(255,255,255,.55)';ctx.fillText(`stable ${stable} / ${mode}`,128,112);status.innerHTML=`<b>${mode.toUpperCase()}</b> faces:${raw} stable:${stable}`;fill.style.width=Math.round(cf*100)+'%'}function round(x,y,w,h,r){ctx.beginPath();ctx.roundRect?ctx.roundRect(x,y,w,h,r):(ctx.rect(x,y,w,h));ctx.fill()}function lerp(a,b,t){return a+(b-a)*t}let prev=performance.now();function loop(now){let dt=Math.min(.05,(now-prev)/1000);prev=now;if(started){detect(now);update(dt)}draw();requestAnimationFrame(loop)}front.onclick=()=>startCamera('user');rear.onclick=()=>startCamera('environment');demo.onclick=demoStart;videoBtn.onclick=()=>{showVideo=!showVideo;videoBtn.textContent='VIDEO '+(showVideo?'ON':'OFF')};mirrorBtn.onclick=()=>{mirror=!mirror;mirrorBtn.textContent='MIRROR '+(mirror?'ON':'OFF')};resetBtn.onclick=()=>{resetParticles();raw=stable=acc=0;smooth=[]};fullBtn.onclick=()=>{if(!document.fullscreenElement)document.documentElement.requestFullscreen?.();else document.exitFullscreen?.()};menuBtn.onclick=()=>{panel.style.display='grid'};resize();envText();addEventListener('resize',resize);requestAnimationFrame(loop);</script></body></html>
