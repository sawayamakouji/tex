<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<meta name="theme-color" content="#05060a" />
<title>Camera People Count Space</title>
<style>
:root{color-scheme:dark;--bg:#05060a;--panel:rgba(8,10,18,.82);--border:rgba(255,255,255,.16);--text:rgba(255,255,255,.94);--muted:rgba(255,255,255,.66);--danger:rgba(255,135,150,.95);--safe-top:env(safe-area-inset-top,0px);--safe-right:env(safe-area-inset-right,0px);--safe-bottom:env(safe-area-inset-bottom,0px);--safe-left:env(safe-area-inset-left,0px)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;padding:0;overflow:hidden;width:100%;height:100%;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;touch-action:none;overscroll-behavior:none}canvas{position:fixed;inset:0;display:block;width:100vw;height:100vh}video{display:none}
#start{position:fixed;inset:0;z-index:30;display:grid;place-items:center;padding:calc(18px + var(--safe-top)) calc(16px + var(--safe-right)) calc(18px + var(--safe-bottom)) calc(16px + var(--safe-left));background:radial-gradient(circle at 50% 18%,rgba(72,132,255,.24),transparent 38%),radial-gradient(circle at 18% 80%,rgba(198,118,255,.15),transparent 34%),linear-gradient(180deg,rgba(5,6,10,.35),rgba(5,6,10,.93));backdrop-filter:blur(10px)}
#card{width:min(860px,100%);max-height:calc(100vh - 36px - var(--safe-top) - var(--safe-bottom));overflow:auto;border:1px solid var(--border);border-radius:24px;padding:22px;background:var(--panel);box-shadow:0 22px 80px rgba(0,0,0,.55);-webkit-overflow-scrolling:touch}h1{margin:0 0 10px;font-size:clamp(25px,7vw,44px);line-height:1.04;letter-spacing:-.055em}p{margin:10px 0;color:var(--muted);line-height:1.72;font-size:14px}.grid{display:grid;grid-template-columns:1fr;gap:10px;margin-top:18px}@media(min-width:620px){.grid{grid-template-columns:1fr 1fr 1fr}}
button{appearance:none;border:1px solid rgba(255,255,255,.18);border-radius:18px;min-height:54px;padding:14px 16px;font-size:15px;font-weight:750;line-height:1.2;color:#07111f;background:linear-gradient(135deg,#fff,#9ec7ff 52%,#c8a7ff);box-shadow:0 12px 38px rgba(120,170,255,.25);cursor:pointer;user-select:none;text-align:center}.secondary{color:var(--text);background:rgba(255,255,255,.08);box-shadow:none}button:active{transform:translateY(1px) scale(.99)}
.note,#env{margin-top:14px;padding:12px 14px;border-radius:16px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.075);color:var(--muted);font-size:12px;line-height:1.65}.error{margin-top:12px;color:var(--danger);font-size:13px;line-height:1.6;white-space:pre-wrap}
#hud{position:fixed;top:calc(10px + var(--safe-top));left:calc(10px + var(--safe-left));right:calc(10px + var(--safe-right));z-index:8;display:flex;gap:8px;align-items:center;pointer-events:none;user-select:none}#status{flex:1;min-width:0;padding:9px 11px;border:1px solid var(--border);border-radius:999px;background:rgba(8,10,18,.56);backdrop-filter:blur(8px);color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}#status strong{color:var(--text)}#meter{width:92px;height:9px;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.08)}#fill{height:100%;width:0%;border-radius:999px;background:linear-gradient(90deg,#70e0ff,#fff,#cba5ff)}
#controls{position:fixed;left:calc(10px + var(--safe-left));right:calc(10px + var(--safe-right));bottom:calc(10px + var(--safe-bottom));z-index:12;display:grid;grid-template-columns:repeat(6,1fr);gap:7px;transition:opacity .18s ease,transform .18s ease}#controls.hidden{opacity:0;transform:translateY(14px);pointer-events:none}.touch{border:1px solid rgba(255,255,255,.15);border-radius:15px;min-height:48px;padding:9px 4px;background:rgba(8,10,18,.62);color:var(--text);backdrop-filter:blur(10px);font-size:10.5px;font-weight:750;line-height:1.15;box-shadow:none}.small{font-size:10px;color:var(--muted)}#tap{position:fixed;inset:0;z-index:7;pointer-events:auto}
</style>
</head>
<body>
<canvas id="c"></canvas><video id="v" playsinline muted autoplay></video>
<div id="start"><div id="card"><h1>People Count Space</h1><p>カメラに映った顔の数をカウントし、人数と顔位置で粒子空間を変化させます。これは「顔が見えている人数」のカウントです。後ろ姿・横向き・顔が隠れた人は漏れる場合があります。</p><div class="grid"><button id="front">前面カメラで開始</button><button id="rear" class="secondary">背面カメラで開始</button><button id="demo" class="secondary">デモ表示</button></div><div class="note">スマホのカメラ利用はHTTPS配信が前提です。カメラ映像はブラウザ内で処理し、保存・送信はしません。ただしMediaPipeライブラリとモデルはCDN/Google Storageから読み込みます。</div><div id="env"></div><div id="err" class="error"></div></div></div>
<div id="tap"></div><div id="hud"><div id="status"><strong>READY</strong> faces: 0</div><div id="meter"><div id="fill"></div></div></div>
<div id="controls"><button class="touch" id="videoBtn">VIDEO<br><span class="small">ON</span></button><button class="touch" id="mirrorBtn">MIRROR<br><span class="small">ON</span></button><button class="touch" id="resetBtn">RESET</button><button class="touch" id="fullBtn">FULL</button><button class="touch" id="saveBtn">SAVE</button><button class="touch" id="menuBtn">MENU</button></div>
<script type="module">
import{FaceDetector,FilesetResolver}from"https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.22-rc.20250304/vision_bundle.mjs";
const MODEL="https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/latest/blaze_face_short_range.tflite";
const WASM="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.22-rc.20250304/wasm";
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d',{alpha:false}),video=document.getElementById('v');
const low=(matchMedia('(pointer: coarse)').matches||innerWidth<720),dpr=low?1:Math.min(2,devicePixelRatio||1),detectMs=low?160:95,particleBase=low?420:820;
let W=0,H=0,detector=null,loading=false,stream=null,mode='none',facing='user',started=false,showVideo=true,mirror=true,controlsVisible=true;
let particles=[],faces=[],smoothFaces=[],raw=0,stable=0,acc=0,lastDetect=0,lastVideoTime=-1,history=[],lastHist=0,lastFrame=performance.now(),demoT=0;
const start=document.getElementById('start'),err=document.getElementById('err'),env=document.getElementById('env'),status=document.getElementById('status'),fill=document.getElementById('fill'),controls=document.getElementById('controls');
function resize(){W=innerWidth;H=innerHeight;canvas.width=Math.floor(W*dpr);canvas.height=Math.floor(H*dpr);canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0);resetParticles()}function envRender(){env.innerHTML=[`secureContext: <strong>${isSecureContext}</strong>`,`camera API: <strong>${!!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia)}</strong>`,`protocol: <strong>${location.protocol}</strong>`,`host: <strong>${location.host||'(local file)'}</strong>`,`mode: <strong>${low?'mobile/low-power':'desktop'}</strong>`].join('<br>')}
async function loadDetector(){if(detector)return detector;if(loading){while(loading)await sleep(80);return detector}loading=true;try{const vision=await FilesetResolver.forVisionTasks(WASM);try{detector=await FaceDetector.createFromOptions(vision,{baseOptions:{modelAssetPath:MODEL,delegate:'GPU'},runningMode:'VIDEO',minDetectionConfidence:.52})}catch(e){detector=await FaceDetector.createFromOptions(vision,{baseOptions:{modelAssetPath:MODEL,delegate:'CPU'},runningMode:'VIDEO',minDetectionConfidence:.52})}return detector}finally{loading=false}}
async function startCamera(f){clearErr();try{if(!isSecureContext)throw new Error('このページはsecureContextではありません。スマホのカメラ利用にはHTTPS配信が必要です。');if(!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia))throw new Error('getUserMediaが利用できません。ブラウザまたは権限設定を確認してください。');facing=f;mirror=f==='user';updateMirrorBtn();await loadDetector();stopCamera();stream=await navigator.mediaDevices.getUserMedia({audio:false,video:{facingMode:{ideal:f},width:{ideal:low?640:960},height:{ideal:low?480:720},frameRate:{ideal:low?24:30,max:low?30:60}}});video.srcObject=stream;await video.play();mode='camera';started=true;start.style.display='none';resetCounters();wake()}catch(e){showErr('カメラを開始できませんでした。\n\n確認事項：\n1. HTTPSのURLで開いているか\n2. ブラウザでカメラ権限を許可したか\n3. iPhoneはSafari/Chrome、AndroidはChromeで試したか\n4. 社内端末の場合、カメラ利用が制限されていないか\n\n'+(e.name?e.name+': ':'')+(e.message||e));envRender()}}
function startDemo(){clearErr();stopCamera();mode='demo';started=true;start.style.display='none';resetCounters();wake()}function stopCamera(){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}video.srcObject=null}function resetCounters(){faces=[];smoothFaces=[];raw=0;stable=0;acc=0;history=[];lastHist=0;lastDetect=0;lastVideoTime=-1}
function resetParticles(){let n=Math.floor(particleBase*clamp(W*H/(390*844),.72,low?1.6:3.2));particles=[];for(let i=0;i<n;i++)particles.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.6,vy:(Math.random()-.5)*.6,s:.8+Math.random()*(low?1.6:2.2),h:190+Math.random()*120,life:Math.random()})}
function loop(now){let dt=Math.min(.05,(now-lastFrame)/1000);lastFrame=now;if(started){updateInput(now);updateParticles(dt)}draw(now);requestAnimationFrame(loop)}function updateInput(now){if(mode==='camera')detect(now);else if(mode==='demo')demoUpdate(now);acc=lerp(acc,raw,.18);stable=Math.round(acc);if(now-lastHist>500){lastHist=now;history.push({t:now,v:raw});while(history.length>180)history.shift()}}
function detect(now){if(!detector||video.readyState<2)return;if(now-lastDetect<detectMs)return;if(video.currentTime===lastVideoTime)return;lastDetect=now;lastVideoTime=video.currentTime;try{let res=detector.detectForVideo(video,now),ds=res?.detections||[];raw=ds.length;faces=ds.map(detToFace).filter(Boolean);smoothFaces=smoothFaceList(smoothFaces,faces)}catch(e){console.warn(e)}}
function detToFace(d){let bb=d.boundingBox||d.bounding_box||d.bounds;if(!bb)return null;let vw=video.videoWidth||640,vh=video.videoHeight||480;let x=bb.originX??bb.xMin??bb.x??0,y=bb.originY??bb.yMin??bb.y??0,w=bb.width??((bb.xMax??0)-x),h=bb.height??((bb.yMax??0)-y);let m=mapRect(x,y,w,h,vw,vh);return{x:m.x,y:m.y,w:m.w,h:m.h,cx:m.x+m.w/2,cy:m.y+m.h/2,score:d.categories?.[0]?.score??1}}
function mapRect(x,y,w,h,vw,vh){let scale=Math.max(W/vw,H/vh),dw=vw*scale,dh=vh*scale,ox=(W-dw)/2,oy=(H-dh)/2;let rx=ox+x*scale,ry=oy+y*scale,rw=w*scale,rh=h*scale;if(mirror)rx=W-(rx+rw);return{x:rx,y:ry,w:rw,h:rh}}
function smoothFaceList(prev,next){if(!prev.length)return next.map(f=>({...f}));let used=new Set(),out=[];for(const nf of next){let bi=-1,bd=1e9;for(let i=0;i<prev.length;i++){if(used.has(i))continue;let pf=prev[i],d=Math.hypot(nf.cx-pf.cx,nf.cy-pf.cy);if(d<bd){bd=d;bi=i}}if(bi>=0&&bd<Math.max(W,H)*.25){used.add(bi);let p=prev[bi];out.push({x:lerp(p.x,nf.x,.35),y:lerp(p.y,nf.y,.35),w:lerp(p.w,nf.w,.35),h:lerp(p.h,nf.h,.35),cx:lerp(p.cx,nf.cx,.35),cy:lerp(p.cy,nf.cy,.35),score:nf.score})}else out.push({...nf})}return out}
function demoUpdate(now){demoT=now*.001;raw=clamp(Math.floor(1.5+1.5*Math.sin(demoT*.55)+1.0*Math.sin(demoT*.21)),0,4);let out=[];for(let i=0;i<raw;i++){let a=demoT*(.45+i*.08)+i*2.2,cx=W*(.5+Math.cos(a)*(.16+i*.035)),cy=H*(.44+Math.sin(a*1.2)*(.12+i*.025)),s=Math.min(W,H)*(.17+.018*Math.sin(a*2));out.push({x:cx-s*.42,y:cy-s*.55,w:s*.84,h:s,cx,cy,score:1})}faces=out;smoothFaces=smoothFaceList(smoothFaces,out)}
function updateParticles(dt){let ats=smoothFaces.map(f=>({x:f.cx,y:f.cy,r:Math.max(f.w,f.h)})),cf=clamp(raw/5,0,1),center=raw? .001:.004;for(const p of particles){let ax=(W*.5-p.x)*center,ay=(H*.5-p.y)*center;for(const a of ats){let dx=a.x-p.x,dy=a.y-p.y,ds=dx*dx+dy*dy+80,d=Math.sqrt(ds),inf=Math.min(2.2,(a.r*18)/ds);if(d<a.r*.72){ax-=dx/d*inf*.42;ay-=dy/d*inf*.42}else{ax+=dx/d*inf*(.18+cf*.32);ay+=dy/d*inf*(.18+cf*.32)}}let sw=Math.sin(p.x*.006+p.y*.004+performance.now()*.0004);ax+=Math.cos(sw*Math.PI*2)*(.018+cf*.035);ay+=Math.sin(sw*Math.PI*2)*(.018+cf*.035);p.vx=(p.vx+ax)*(.965-cf*.02);p.vy=(p.vy+ay)*(.965-cf*.02);p.x+=p.vx*dt*60;p.y+=p.vy*dt*60;p.life+=dt*(.15+cf*.55);if(p.x<-40)p.x=W+40;if(p.x>W+40)p.x=-40;if(p.y<-40)p.y=H+40;if(p.y>H+40)p.y=-40}}
function draw(){bg();if(started&&mode==='camera'&&showVideo&&video.readyState>=2)videoBg();particlesDraw();connections();faceFrames();countPanel();timeline();hud()}
function bg(){let cf=clamp(raw/5,0,1),g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,`hsl(${225+cf*45},54%,${5+cf*2}%)`);g.addColorStop(.55,'#05060a');g.addColorStop(1,`hsl(${260+cf*40},44%,${5+cf*2}%)`);ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.save();ctx.globalAlpha=.15+cf*.1;let rg=ctx.createRadialGradient(W*.5,H*.2,0,W*.5,H*.2,W*.75);rg.addColorStop(0,`rgba(${80+raw*20},130,255,.42)`);rg.addColorStop(1,'rgba(80,130,255,0)');ctx.fillStyle=rg;ctx.fillRect(0,0,W,H);ctx.restore()}
function videoBg(){let vw=video.videoWidth||640,vh=video.videoHeight||480,scale=Math.max(W/vw,H/vh),dw=vw*scale,dh=vh*scale,x=(W-dw)/2,y=(H-dh)/2;ctx.save();ctx.globalAlpha=.16;ctx.filter='blur(2px) saturate(1.25) contrast(1.1)';if(mirror){ctx.translate(W,0);ctx.scale(-1,1);ctx.drawImage(video,x,y,dw,dh)}else ctx.drawImage(video,x,y,dw,dh);ctx.restore();ctx.save();ctx.globalAlpha=.44;ctx.fillStyle='rgba(5,6,10,.58)';ctx.fillRect(0,0,W,H);ctx.restore()}
function particlesDraw(){ctx.save();ctx.globalCompositeOperation='lighter';let cf=clamp(raw/5,0,1);for(const p of particles){let hue=(p.h+raw*22+p.life*28)%360,a=.18+cf*.32,r=p.s*(1+cf*1.8+Math.sin(p.life*7)*.25);ctx.fillStyle=`hsla(${hue},${62+cf*25}%,${58+cf*20}%,${a})`;ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fill();if(!low&&raw>0){ctx.strokeStyle=`hsla(${hue},85%,70%,${a*.18})`;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x-p.vx*3.5,p.y-p.vy*3.5);ctx.stroke()}}ctx.restore()}
function connections(){if(smoothFaces.length<2)return;ctx.save();ctx.globalCompositeOperation='lighter';for(let i=0;i<smoothFaces.length;i++)for(let j=i+1;j<smoothFaces.length;j++){let a=smoothFaces[i],b=smoothFaces[j],dist=Math.hypot(b.cx-a.cx,b.cy-a.cy),al=clamp(1-dist/(Math.max(W,H)*.9),.12,.72),gr=ctx.createLinearGradient(a.cx,a.cy,b.cx,b.cy);gr.addColorStop(0,`rgba(120,220,255,${al})`);gr.addColorStop(1,`rgba(210,170,255,${al})`);ctx.strokeStyle=gr;ctx.lineWidth=1.5+stable*.6;ctx.shadowBlur=16;ctx.shadowColor='rgba(140,220,255,.38)';ctx.beginPath();ctx.moveTo(a.cx,a.cy);ctx.lineTo(b.cx,b.cy);ctx.stroke()}ctx.restore()}
function faceFrames(){ctx.save();ctx.globalCompositeOperation='lighter';for(let i=0;i<smoothFaces.length;i++){let f=smoothFaces[i],h=(190+i*38+stable*26)%360,pad=Math.max(f.w,f.h)*.16;ctx.strokeStyle=`hsla(${h},86%,70%,.88)`;ctx.lineWidth=2.2;ctx.shadowBlur=18;ctx.shadowColor=`hsla(${h},86%,70%,.48)`;roundPath(f.x-pad,f.y-pad,f.w+pad*2,f.h+pad*2,18);ctx.stroke();ctx.fillStyle=`hsla(${h},86%,72%,.18)`;ctx.beginPath();ctx.arc(f.cx,f.cy,Math.max(f.w,f.h)*(.56+.04*Math.sin(performance.now()*.004+i)),0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,.88)';ctx.font='700 13px system-ui';ctx.fillText('#'+(i+1),f.x-pad,f.y-pad-8)}ctx.restore()}
function countPanel(){let x=12,y=58,w=Math.min(320,W-24),h=118;round(x,y,w,h,20,'rgba(8,10,18,.54)','rgba(255,255,255,.13)');ctx.fillStyle='rgba(255,255,255,.56)';ctx.font='700 10px system-ui';ctx.fillText('FACE COUNT',x+16,y+24);ctx.fillStyle='rgba(255,255,255,.96)';ctx.font='800 58px system-ui';ctx.fillText(String(raw),x+16,y+82);ctx.fillStyle='rgba(255,255,255,.48)';ctx.font='12px system-ui';ctx.fillText(`stable ${stable} / detector ${detector?'ready':'loading'}`,x+118,y+54);ctx.fillText(mode==='camera'?`camera ${facing}`:mode,x+118,y+76)}
function timeline(){if(!history.length)return;let x=12,w=Math.min(360,W-24),h=48,y=H-(controlsVisible?126:58);if(y<190)return;round(x,y,w,h,16,'rgba(8,10,18,.44)','rgba(255,255,255,.10)');ctx.save();ctx.beginPath();ctx.rect(x+12,y+10,w-24,h-20);ctx.clip();let maxV=Math.max(4,...history.map(p=>p.v));ctx.strokeStyle='rgba(140,220,255,.86)';ctx.lineWidth=2;ctx.beginPath();for(let i=0;i<history.length;i++){let px=x+12+i/Math.max(1,179)*(w-24),py=y+h-12-history[i].v/maxV*(h-22);if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py)}ctx.stroke();ctx.restore();ctx.fillStyle='rgba(255,255,255,.48)';ctx.font='10px system-ui';ctx.fillText('count timeline',x+16,y+16)}
function hud(){let a=clamp(raw/5,0,1);fill.style.width=Math.round(a*100)+'%';status.innerHTML=`<strong>${mode.toUpperCase()}</strong> faces: ${raw} / stable: ${stable} / particles: ${particles.length}`}
function toggleControls(){controlsVisible=!controlsVisible;controls.classList.toggle('hidden',!controlsVisible)}function openMenu(){start.style.display='grid';controlsVisible=true;controls.classList.remove('hidden');envRender()}function toggleVideo(){showVideo=!showVideo;document.querySelector('#videoBtn .small').textContent=showVideo?'ON':'OFF'}function toggleMirror(){mirror=!mirror;updateMirrorBtn()}function updateMirrorBtn(){document.querySelector('#mirrorBtn .small').textContent=mirror?'ON':'OFF'}
function round(x,y,w,h,r,fill,stroke){ctx.save();roundPath(x,y,w,h,r);if(fill){ctx.fillStyle=fill;ctx.fill()}if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=1;ctx.stroke()}ctx.restore()}function roundPath(x,y,w,h,r){let rr=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+rr,y);ctx.lineTo(x+w-rr,y);ctx.quadraticCurveTo(x+w,y,x+w,y+rr);ctx.lineTo(x+w,y+h-rr);ctx.quadraticCurveTo(x+w,y+h,x+w-rr,y+h);ctx.lineTo(x+rr,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-rr);ctx.lineTo(x,y+rr);ctx.quadraticCurveTo(x,y,x+rr,y);ctx.closePath()}
function lerp(a,b,t){return a+(b-a)*t}function clamp(v,min,max){return Math.max(min,Math.min(max,v))}function sleep(ms){return new Promise(r=>setTimeout(r,ms))}function showErr(m){err.textContent=m}function clearErr(){err.textContent=''}async function wake(){try{if('wakeLock'in navigator)await navigator.wakeLock.request('screen')}catch(e){}}
front.onclick=()=>startCamera('user');rear.onclick=()=>startCamera('environment');demo.onclick=startDemo;videoBtn.onclick=e=>{e.stopPropagation();toggleVideo()};mirrorBtn.onclick=e=>{e.stopPropagation();toggleMirror()};resetBtn.onclick=e=>{e.stopPropagation();resetParticles();resetCounters()};fullBtn.onclick=e=>{e.stopPropagation();if(!document.fullscreenElement)document.documentElement.requestFullscreen?.();else document.exitFullscreen?.()};saveBtn.onclick=e=>{e.stopPropagation();let a=document.createElement('a');a.download='people-count-space.png';a.href=canvas.toDataURL('image/png');a.click()};menuBtn.onclick=e=>{e.stopPropagation();openMenu()};tap.onclick=()=>{if(started)toggleControls()};addEventListener('resize',resize);addEventListener('orientationchange',()=>setTimeout(resize,360));document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')wake()});resize();envRender();requestAnimationFrame(loop);
</script></body></html>
